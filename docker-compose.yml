version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: imc-postgres
    environment:
      POSTGRES_USER: imc_user
      POSTGRES_PASSWORD: imc_password
      POSTGRES_DB: imc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imc_user -d imc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mongodb:
    image: mongo:6-jammy
    container_name: imc-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: imc-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    image: node:18-alpine
    container_name: imc-api
    working_dir: /app
    volumes:
      - ./api:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_URL=postgres://imc_user:imc_password@postgres:5432/imc_db
      - MONGO_URL=mongodb://admin:admin_password@mongodb:27017/imc_db?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:18-alpine
    container_name: imc-worker
    working_dir: /app
    volumes:
      - ./api:/app
    command: sh -c "npm install && node batchWorker.js"
    environment:
      - POSTGRES_URL=postgres://imc_user:imc_password@postgres:5432/imc_db
      - MONGO_URL=mongodb://admin:admin_password@mongodb:27017/imc_db?authSource=admin
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: imc-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1

volumes:
  postgres_data:
  mongo_data:
  redis_data:
